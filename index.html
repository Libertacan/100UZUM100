<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{background:#341044;color:white;font-family:system-ui;margin:0}.w{max-width:800px;margin:auto;padding:24px}.card,.poll{background:rgba(255,255,255,.08);padding:16px;border-radius:16px;margin:16px 0}audio{width:100%}h1{text-align:center}</style></head><body><div class=w><h1>100ÜZÜM100</h1><div class="card"><div>100ÜZÜM100 1</div><audio controls preload="none"><source src="tracks/100ÜZÜM100 1.mp3"></audio></div><div class="card"><div>100ÜZÜM100 2</div><audio controls preload="none"><source src="tracks/100ÜZÜM100 2.mp3"></audio></div><div class="card"><div>100ÜZÜM100 3</div><audio controls preload="none"><source src="tracks/100ÜZÜM100 3.mp3"></audio></div><div class="card"><div>100ÜZÜM100 4</div><audio controls preload="none"><source src="tracks/100ÜZÜM100 4.mp3"></audio></div><div class=poll><h3>Which one did you like the most?</h3><label><input type="radio" name="vote" value="0"> 100ÜZÜM100 1</label><br><label><input type="radio" name="vote" value="1"> 100ÜZÜM100 2</label><br><label><input type="radio" name="vote" value="2"> 100ÜZÜM100 3</label><br><label><input type="radio" name="vote" value="3"> 100ÜZÜM100 4</label><br><button onclick="localStorage.removeItem('v');document.querySelectorAll('input').forEach(x=>x.checked=false)">Clear</button></div></div><script>const rs=[...document.querySelectorAll('input')];let s=localStorage.getItem('v');if(s!==null){let r=rs.find(x=>x.value===s);if(r)r.checked=true};rs.forEach(r=>r.onclick=()=>{if(localStorage.getItem('v')===r.value){localStorage.removeItem('v');r.checked=false}else localStorage.setItem('v',r.value)})</script></body></html>
