<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100ÜZÜM100</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        /* Premium Koyu Tema ve Üzüm Renk Paleti */
        :root {
            --bg-color: #0b0713;
            --card-bg: rgba(26, 18, 43, 0.7);
            --card-border: rgba(94, 43, 145, 0.3);
            --text-color: #f3f0f7;
            --accent-color: #9d4edd;
            --accent-hover: #c77dff;
            --voted-color: #38b000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plandaki Düşen Saydam Üzümler Animasyonu */
        .grape-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .falling-grape {
            position: absolute;
            top: -50px;
            font-size: 24px;
            opacity: 0.15;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.15;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 600px;
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
            letter-spacing: 2px;
        }

        /* Bölüm Başlıkları */
        .section-title {
            font-size: 1.4rem;
            color: var(--accent-hover);
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            letter-spacing: 1px;
        }

        /* 1. BÖLÜM: ŞARKI OYNATICILARI (Sadece Dinleme) */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .player-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .player-card .song-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            display: block;
        }

        audio {
            width: 100%;
            border-radius: 8px;
            outline: none;
            display: block;
        }

        audio::-webkit-media-controls-panel {
            background-color: #1a122b;
        }

        /* 2. BÖLÜM: OYLAMA ALANI (Tamamen Ayrı) */
        .voting-section {
            background: rgba(20, 13, 33, 0.8);
            border: 1px solid rgba(157, 78, 221, 0.4);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .voting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .total-votes-box {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.2);
        }

        .vote-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .vote-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(25, 17, 41, 0.5);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .vote-row:hover {
            border-color: rgba(157, 78, 221, 0.2);
        }

        .vote-label {
            font-size: 1rem;
            font-weight: 500;
        }

        .vote-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Küp Şeklinde Kare Buton */
        .vote-btn {
            width: 34px;
            height: 34px;
            background: transparent;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .vote-btn:hover {
            background: rgba(157, 78, 221, 0.2);
        }

        /* Oy verilmiş yeşil buton durumu */
        .vote-btn.voted {
            border-color: var(--voted-color);
            background: var(--voted-color);
            color: #fff;
        }

        .vote-count {
            font-size: 0.9rem;
            color: #b3a7c4;
            min-width: 65px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="grape-container" id="grapeContainer"></div>

    <div class="container">
        <header>
            <h1>100ÜZÜM100</h1>
        </header>

        <section>
            <h2 class="section-title">Şarkıları Dinle</h2>
            <div class="player-list">
                <div class="player-card">
                    <span class="song-title">100ÜZÜM100 1</span>
                    <audio controls src="1.mp3" preload="auto"></audio>
                </div>
                <div class="player-card">
                    <span class="song-title">100ÜZÜM100 2</span>
                    <audio controls src="2.mp3" preload="auto"></audio>
                </div>
                <div class="player-card">
                    <span class="song-title">100ÜZÜM100 3</span>
                    <audio controls src="3.mp3" preload="auto"></auto>
                </div>
                <div class="player-card">
                    <span class="song-title">100ÜZÜM100 4</span>
                    <audio controls src="4.mp3" preload="auto"></audio>
                </div>
            </div>
        </section>

        <section class="voting-section">
            <div class="voting-header">
                <h2 class="section-title" style="margin-bottom: 0;">En Beğendiğin Şarkıyı Seç</h2>
                <div class="total-votes-box">Total Votes: <span id="totalVotes">0</span></div>
            </div>

            <div class="vote-list">
                <div class="vote-row" data-id="1">
                    <span class="vote-label">100ÜZÜM100 1</span>
                    <div class="vote-actions">
                        <button class="vote-btn" onclick="toggleVote(1)">✓</button>
                        <span class="vote-count" id="count-1">0 votes</span>
                    </div>
                </div>
                <div class="vote-row" data-id="2">
                    <span class="vote-label">100ÜZÜM100 2</span>
                    <div class="vote-actions">
                        <button class="vote-btn" onclick="toggleVote(2)">✓</button>
                        <span class="vote-count" id="count-2">0 votes</span>
                    </div>
                </div>
                <div class="vote-row" data-id="3">
                    <span class="vote-label">100ÜZÜM100 3</span>
                    <div class="vote-actions">
                        <button class="vote-btn" onclick="toggleVote(3)">✓</button>
                        <span class="vote-count" id="count-3">0 votes</span>
                    </div>
                </div>
                <div class="vote-row" data-id="4">
                    <span class="vote-label">100ÜZÜM100 4</span>
                    <div class="vote-actions">
                        <button class="vote-btn" onclick="toggleVote(4)">✓</button>
                        <span class="vote-count" id="count-4">0 votes</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Supabase Bağlantı Bilgileri
        const SUPABASE_URL = "https://iugqearshkagosjttxff.supabase.co";
        const SUPABASE_KEY = "sb_publishable_pZGpAKyc4Ulj8pvKYUSE7g_2g73jxLa";

        let userVotedSongId = localStorage.getItem('votedSongId') ? parseInt(localStorage.getItem('votedSongId')) : null;
        let currentVotesData = {};

        // Veritabanından oyları çekme
        async function fetchVotes() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/votes?select=*`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await response.json();
                
                let total = 0;
                data.forEach(item => {
                    currentVotesData[item.id] = item.vote_count;
                    total += item.vote_count;
                    
                    const countEl = document.getElementById(`count-${item.id}`);
                    if (countEl) countEl.innerText = `${item.vote_count} votes`;
                });

                document.getElementById('totalVotes').innerText = total;
                updateButtonStates();
            } catch (error) {
                console.error("Oylar çekilirken hata oluştu:", error);
            }
        }

        // Butonların basılı/basılı değil durumunu günceller
        function updateButtonStates() {
            const rows = document.querySelectorAll('.vote-row');
            rows.forEach(row => {
                const songId = parseInt(row.getAttribute('data-id'));
                const btn = row.querySelector('.vote-btn');
                if (songId === userVotedSongId) {
                    btn.classList.add('voted');
                } else {
                    btn.classList.remove('voted');
                }
            });
        }

        // Veritabanı güncelleme (Patch)
        async function updateVoteInDatabase(songId, newCount) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/votes?id=eq.${songId}`, {
                    method: 'PATCH',
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ vote_count: newCount })
                });
            } catch (error) {
                console.error("Veritabanı güncellenirken hata:", error);
            }
        }

        // Oylama mekanizması (Tek oy hakkı)
        async function toggleVote(songId) {
            if (userVotedSongId === songId) {
                const currentCount = currentVotesData[songId] || 0;
                const newCount = Math.max(0, currentCount - 1);
                
                currentVotesData[songId] = newCount;
                userVotedSongId = null;
                localStorage.removeItem('votedSongId');
                
                await updateVoteInDatabase(songId, newCount);
            } 
            else {
                if (userVotedSongId !== null) {
                    const oldSongId = userVotedSongId;
                    const oldSongCount = currentVotesData[oldSongId] || 0;
                    const oldNewCount = Math.max(0, oldSongCount - 1);
                    currentVotesData[oldSongId] = oldNewCount;
                    await updateVoteInDatabase(oldSongId, oldNewCount);
                }

                const currentCount = currentVotesData[songId] || 0;
                const newCount = currentCount + 1;
                currentVotesData[songId] = newCount;
                
                userVotedSongId = songId;
                localStorage.setItem('votedSongId', songId);
                
                await updateVoteInDatabase(songId, newCount);
            }

            // Arayüzü anlık güncelleme
            let total = 0;
            Object.keys(currentVotesData).forEach(id => {
                total += currentVotesData[id];
                const countEl = document.getElementById(`count-${id}`);
                if (countEl) countEl.innerText = `${currentVotesData[id]} votes`;
            });
            document.getElementById('totalVotes').innerText = total;
            updateButtonStates();
        }

        // Arka plan animasyonu
        function createGrapeRain() {
            const container = document.getElementById('grapeContainer');
            const grapeEmojis = ['🍇', '🍇', '🔮', '💜'];
            const grapeCount = 20;

            for (let i = 0; i < grapeCount; i++) {
                const grape = document.createElement('div');
                grape.className = 'falling-grape';
                grape.innerText = grapeEmojis[Math.floor(Math.random() * grapeEmojis.length)];
                
                grape.style.left = `${Math.random() * 100}vw`;
                grape.style.animationDuration = `${Math.random() * 8 + 6}s`;
                grape.style.animationDelay = `${Math.random() * 10}s`;
                grape.style.fontSize = `${Math.random() * 15 + 15}px`;

                container.appendChild(grape);
            }
        }

        window.onload = () => {
            fetchVotes();
            createGrapeRain();
        };
    </script>
</body>
</html>
